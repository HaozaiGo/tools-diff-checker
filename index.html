<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <h1 class="logo">📊 Diff Checker</h1>
        <p class="tagline">文本差异对比 · 逐行逐词高亮 · 浏览器端处理</p>
      </div>
    </div>
  </header>

  <main class="main container">
    <!-- View Mode Toggle -->
    <div class="view-controls">
      <div class="view-tabs" role="tablist">
        <button class="view-tab active" data-view="side" tabindex="0">并列视图</button>
        <button class="view-tab" data-view="unified" tabindex="-1">统一视图</button>
      </div>
      <div class="view-actions">
        <span id="diff-stats" class="diff-stats">差异: 0</span>
        <button class="btn btn-sm" onclick="swapInputs()">🔄 交换</button>
        <button class="btn btn-sm" onclick="clearAll()">清空</button>
        <button class="btn btn-sm" onclick="loadSamples()">📝 示例</button>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-panel">
        <div class="panel-header">
          <label for="text-left">原始文本</label>
          <span id="lines-left" class="line-badge">0 lines</span>
        </div>
        <textarea id="text-left" class="diff-editor" placeholder="粘贴原始文本..." spellcheck="false"></textarea>
      </div>
      <div class="input-panel">
        <div class="panel-header">
          <label for="text-right">新文本</label>
          <span id="lines-right" class="line-badge">0 lines</span>
        </div>
        <textarea id="text-right" class="diff-editor" placeholder="粘贴新文本..." spellcheck="false"></textarea>
      </div>
    </div>

    <!-- Diff Options -->
    <div class="options-bar">
      <label class="checkbox-label">
        <input type="checkbox" id="opt-ignore-case" onchange="runDiff()">
        忽略大小写
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="opt-ignore-whitespace" onchange="runDiff()">
        忽略空白差异
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="opt-word-diff" checked onchange="runDiff()">
        单词级高亮
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="opt-wrap" checked onchange="toggleWrap()">
        自动换行
      </label>
    </div>

    <!-- Diff Results: Side by Side -->
    <div id="diff-side" class="diff-output">
      <div class="diff-panel">
        <div class="diff-panel-header removed-header">删除 <span id="removed-count" class="diff-count">0</span></div>
        <div id="diff-left" class="diff-content"></div>
      </div>
      <div class="diff-panel">
        <div class="diff-panel-header added-header">新增 <span id="added-count" class="diff-count">0</span></div>
        <div id="diff-right" class="diff-content"></div>
      </div>
    </div>

    <!-- Diff Results: Unified -->
    <div id="diff-unified" class="diff-output" style="display:none">
      <div class="diff-panel unified">
        <div class="diff-panel-header">差异对比 <span id="unified-count" class="diff-count">0</span></div>
        <div id="diff-unified-content" class="diff-content"></div>
      </div>
    </div>

    <!-- Summary -->
    <div id="diff-summary" class="diff-summary">
      <span class="placeholder-text">在左右两侧输入文本，差异将自动对比</span>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>📊 Diff Checker — 所有处理在浏览器端完成，文本不上传服务器</p>
      <p class="footer-small">纯前端工具 · 零服务端 · 隐私安全</p>
    </div>
  </footer>

  <script src="js/diff.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
